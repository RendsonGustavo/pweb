<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 08 - Prática Box Notícia</title>
    <style>
        body {
            background-color: #d6d6d6;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
        }

        .noticia {
            background-color: #F5F5DC;
            font-family: "Open Sans", Arial, sans-serif;
            border: 1px solid black;
            color: #333;
            font-size: 16px;
            padding-left: 15px;
            padding-right: 10px;
            text-align: justify;
            line-height: 24px;
            width: 500px;
            margin: 20px;
        }

        .noticia h1 {
            color: #c4170c;
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 8px;
        }

        .imagem {
            float: right;
            width: 200px;
            padding: 10px;
        }

        .noticia p {
            clear: both;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="noticia">
            <h1>Título da Notícia</h1>
            <img src="https://via.placeholder.com/200" alt="Imagem" class="imagem">
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Idem iste Velleius interuptus. Sed erat aequius Triarium aliquid de dissensione nostra iudicare. Primum in nostrane potestate est, quid meminerimus?</p>
        </div>
    </div>

</body>
</html>
