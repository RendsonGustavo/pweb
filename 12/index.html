<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Atividade 12 - Atributo Data</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#d2d2c1;
}

h1{
    text-align:center;
}

ul{
    width:500px;
    margin:auto;
    list-style:none;
    padding:0;
}

.pessoa{
    background:white;
    border:1px solid #999;
    padding:15px;
    margin:10px 0;
    cursor:pointer;
    font-size:18px;
}

.pessoa:hover{
    background:#f4f4f4;
}

.pessoa[data-idade="30"]{
    background:#ffff99;
}

.pessoa::before{
    content:"Idade: " attr(data-idade) " | ";
    color:blue;
    font-weight:bold;
}

.pessoa::after{
    content:" | CPF: " attr(data-cpf);
    color:red;
    font-weight:bold;
}

</style>

<script type="text/javascript">

function mostravalor(componente){

    var idade = componente.getAttribute("data-idade");

    var nome = componente.innerHTML;

    alert("Nome: " + nome + "\nIdade: " + idade);

}

</script>

</head>

<body>

<h1>Cadastro de Pessoas</h1>

<ul>

<li
class="pessoa"
data-idade="25"
data-cpf="111.111.111-11"
onclick="mostravalor(this)">
Rendson
</li>

<li
class="pessoa"
data-idade="30"
data-cpf="222.222.222-22"
onclick="mostravalor(this)">
Maria eduarda
</li>

<li
class="pessoa"
data-idade="22"
data-cpf="333.333.333-33"
onclick="mostravalor(this)">
Victoria
</li>

<li
class="pessoa"
data-idade="30"
data-cpf="444.444.444-44"
onclick="mostravalor(this)">
Amanda
</li>

<li
class="pessoa"
data-idade="35"
data-cpf="555.555.555-55"
onclick="mostravalor(this)">
kaylane
</li>

</ul>

</body>
</html>
