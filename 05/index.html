<!DOCTYPE html>
<html>
<head>
    <title>Atividade 05 - CSS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            font-size: 50px;
            color: blue;
        }

        p {
            color: green;
        }

        .minha_classe {
            color: red;
            border: 2px solid black;
        }

        #titulo_especial {
            background-color: yellow;
        }
    </style>

</head>
<body>

    <h1>Título Principal</h1>

    <h1 class="minha_classe">
        Exemplo de Classe
    </h1>

    <h1 id="titulo_especial">
        Exemplo de ID
    </h1>

    <p>Este é um parágrafo comum.</p>

    <p style="color:red; border:1px solid blue;">
        Exemplo de CSS Inline
    </p>

</body>
</html>
