<!DOCTYPE html>
<html>
<head>
    <title>Cadastro</title>
</head>
<body>
   <form action="https://qfqdkj.hospedagemelastica.com.br/pweb/salvar.jsp" method="POST">
    Login * : <br>
    <input type="text" required name="login"><br>

    Senha : <br>
    <input type="password" name="senha"><br>
    Confirmar senha : <br>
    <input type="password" name="confirmarsenha"><br>

    Nome : <br>
    <input type="text" name="nome"><br>

    <input type="radio" value="Masculino" name="sexo">Masculino<br>
    <input type="radio" value="Feminino" name="sexo">Feminino<br>

    Email : <br>
    <input type="Email" name="email"><br><br>

    Interesses : <br>

    <input type="checkbox" value="Politica" name="interesses">Politica<br>

        <option value="SP">SP</option>
        <option value="RJ">RJ</option>
        <option value="MG">MG</option>
        <option value="BA">BA</option>
        <option value="PE">PE</option>
        <option value="CE">CE</option>
        <option value="PR">PR</option>
        <option value="SC">SC</option>

    </select><br><br>

    Observacoes : <br>

</form>

</html>
