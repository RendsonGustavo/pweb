<!DOCTYPE html>
<html>
<head>
    <title>Atividade 09 - Posicionamento</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#d2d2c1;
            margin:0;
        }

        #menu{
            background:#666;
            padding:15px;
        }

        #menu a{
            color:white;
            text-decoration:none;
            margin-right:20px;
            font-weight:bold;
        }

        #conteudo{
            width:900px;
            margin:auto;
            background:white;
            padding:20px;
            margin-top:20px;
        }

        #principal{
            position:relative;
            height:500px;
            border:2px solid #999;
            background:#f4f4f4;
        }

        .caixa{
            width:200px;
            height:200px;
            color:white;
            font-size:22px;
            text-align:center;
            line-height:200px;
            font-weight:bold;
        }

        #caixa1{
            background:green;
            position:relative;
            top:40px;
            left:40px;
        }

        #caixa2{
            background:blue;
            position:absolute;
            top:120px;
            left:260px;
        }

        #caixa3{
            background:red;
            position:fixed;
            bottom:20px;
            right:20px;
        }

    </style>

</head>
<body>

    <div id="menu">
        <a href="index.html">Posicionamento</a>
        <a href="layout.html">Layout Fixo</a>
    </div>

    <div id="conteudo">

        <h1>CSS Intermediário - Posicionamento</h1>

        <p>
            As propriedades de posicionamento do CSS são ferramentas importantes
            para controlar a disposição dos elementos em uma página web.
        </p>

        <div id="principal">

            <div class="caixa" id="caixa1">
                Relative
            </div>

            <div class="caixa" id="caixa2">
                Absolute
            </div>

            <div class="caixa" id="caixa3">
                Fixed
            </div>

        </div>

    </div>

</body>
</html>
